  <path d="M256 100 C310 100 360 120 360 180 C360 270 310 350 256 400 C202 350 152 270 152 180 C152 120 202 100 256 100 Z" fill="none" stroke="url(#grad)" stroke-width="16" stroke-linejoin="round"/>
